server:
  port: ${PORT:8080}

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:${MONGO_URL:mongodb://localhost:27017/meterflow}}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

app:
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173,http://127.0.0.1:5173,http://127.0.0.1:5174,http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:meterflow-development-secret-key-change-me-please}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  phonepe:
    environment: ${PHONEPE_ENVIRONMENT:SANDBOX}
    client_id: ${PHONEPE_CLIENT_ID:}
    client_version: ${PHONEPE_CLIENT_VERSION:}
    client_secret: ${PHONEPE_CLIENT_SECRET:}
    redirect_url: ${PHONEPE_REDIRECT_URL:http://localhost:5173}
    pro_amount_paise: ${PHONEPE_PRO_AMOUNT_PAISE:99900}
