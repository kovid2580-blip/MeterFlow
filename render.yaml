services:
  - type: web
    name: meterflow-backend
    runtime: docker
    rootDir: backend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://frontend-sandy-eta-49.vercel.app
      - key: MONGO_URL
        sync: false
      - key: PHONEPE_ENVIRONMENT
        value: SANDBOX
      - key: PHONEPE_CLIENT_ID
        sync: false
      - key: PHONEPE_CLIENT_VERSION
        sync: false
      - key: PHONEPE_CLIENT_SECRET
        sync: false
      - key: PHONEPE_REDIRECT_URL
        value: https://frontend-sandy-eta-49.vercel.app
      - key: PHONEPE_PRO_AMOUNT_PAISE
        value: "99900"
        sync: false
